    <meta name="description" content="Make informed fuel buying decisions with real-time price forecasts for Lagos and beyond." />

    <meta name="theme-color" content="#0f172a" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FuelIQ NG" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FuelIQ NG" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />

    <meta property="og:title" content="FuelIQ NG - Petroleum Market Forecast Platform" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then(function (reg) {
              console.log("[SW] Registered:", reg.scope);
            })
            .catch(function (err) {
              console.log("[SW] Registration failed:", err);
            });
        });
      }
    </script>
  </body>
